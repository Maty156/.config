source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/hyprland-colors.conf
# Hyprland Config - Cleaned & Improved
# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################

monitor = VGA-1, 1366x768@59.79, 0x0, 1.0
monitor=LVDS-1,preferred,auto,auto


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun


#################
### AUTOSTART ###
#################

exec-once = swaync
exec-once = nm-applet &
exec-once = waybar &
exec-once = awww-daemon &
exec-once = rm -f /tmp/wobpipe && mkfifo /tmp/wobpipe && tail -f /tmp/wobpipe | wob -c ~/.config/wob/wob.ini &
exec-once = wal -R -q

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 10
    border_size = 1
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 14

    active_opacity = 0.95
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 16
        render_power = 3
        color = rgba(00000044)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.25
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Apps
bind = $mainMod, Q,      exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, R,      exec, $menu
bind = $mainMod, SPACE,  exec, $menu

# Window management
bind = $mainMod, C,      killactive
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, V, exec, hyprctl dispatch togglefloating && hyprctl dispatch centerwindow && hyprctl dispatch resizeactive exact 900 600
bind = $mainMod, P,      pseudo
bind = $mainMod, J,      layoutmsg, togglesplit
bind = $mainMod, F,      fullscreen

# Session
bind = $mainMod, L,      exec, hyprlock
bind = $mainMod, M,      exec, hyprctl dispatch exit

# Screenshot (requires grim + slurp)
bind = ,         Print,  exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mainMod, Print,  exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Move focus
bind = $mainMod, left,   movefocus, l
bind = $mainMod, right,  movefocus, r
bind = $mainMod, up,     movefocus, u
bind = $mainMod, down,   movefocus, d

# Move windows
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Resize windows
bind = $mainMod ALT, left,  resizeactive, -40 0
bind = $mainMod ALT, right, resizeactive, 40 0
bind = $mainMod ALT, up,    resizeactive, 0 -40
bind = $mainMod ALT, down,  resizeactive, 0 40

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scratchpad
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media & brightness keys
bindel = , XF86AudioRaiseVolume,  exec, ~/.config/hypr/scripts/volume-up.sh
bindel = , XF86AudioLowerVolume,  exec, ~/.config/hypr/scripts/volume-down.sh
bindel = , XF86AudioMute,         exec, ~/.config/hypr/scripts/volume-mute.sh
bindel = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness-up.sh
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-down.sh

#waypaper
bind = $mainMod, W, exec, bash ~/.config/hypr/scripts/matuwall-toggle.sh

# Spotify scratchpad
bind = $mainMod, Z, exec, ~/.config/hypr/scripts/spotify-toggle.sh

#waybar theme
bind = $mainMod, T, exec, /home/matyas/.config/waybar/scripts/switch-theme.sh
##############################
### WINDOWS AND WORKSPACES ###
##############################

# Suppress maximize event for all windows (this one is fine as-is)
windowrule = suppress_event maximize, match:class .*

# Float rules - updated to new syntax
windowrule = float on, match:title nmtui
windowrule = center on, match:title nmtui
windowrule = size 500 400, match:title nmtui

windowrule = float on, match:class ^(pavucontrol)$
windowrule = size 700 450, match:class ^(pavucontrol)$
windowrule = center on, match:class ^(pavucontrol)$

windowrule = float on, match:title ^(Open|Save|Open File|Save File)$
windowrule = center on, match:title ^(Open|Save|Open File|Save File)$

windowrule = float on, match:class ^(org.telegram.desktop)$
windowrule = size 900 620, match:class ^(org.telegram.desktop)$
windowrule = center on, match:class ^(org.telegram.desktop)$

windowrule = float on, match:class ^(org\.gnome\.Loupe)$
windowrule = size 900 620, match:class ^(org\.gnome\.Loupe)$
windowrule = center on, match:class ^(org\.gnome\.Loupe)$

# Spotify scratchpad
windowrule = workspace special:spotify, match:class ^(Spotify)$

# SwayNC layer rules (this was causing your errors on ~lines 275/281)
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center

layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window
