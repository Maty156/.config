# MASU Hyprland — Animations & Borders
# Source this from hyprland.conf:
#   source = ~/.config/hypr/animations.conf

animations {
    enabled = true

    # Bezier curves
    bezier = easeOutExpo,  0.16, 1,    0.3,  1
    bezier = easeOutBack,  0.34, 1.56, 0.64, 1
    bezier = easeInOut,    0.4,  0,    0.6,  1
    bezier = linear,       0,    0,    1,    1
    bezier = snap,         0.19, 1,    0.22, 1

    # Windows
    animation = windowsIn,   1, 4,  easeOutBack,  slide
    animation = windowsOut,  1, 3,  easeInOut,    slide
    animation = windowsMove, 1, 3,  easeOutExpo

    # Borders
    animation = border,      1, 6,  easeOutExpo
    animation = borderangle, 1, 80, linear, loop

    # Fade
    animation = fade,        1, 4,  easeOutExpo
    animation = fadeIn,      1, 4,  easeOutExpo
    animation = fadeOut,     1, 3,  easeInOut

    # Workspaces
    animation = workspaces,  1, 4,  easeOutExpo, slidevert
    animation = specialWorkspace, 1, 4, easeOutBack, slidevert
}

