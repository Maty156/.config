animations {
    enabled = true

    # Bezier curves (unchanged)
    bezier = easeOutExpo,  0.16, 1,    0.3,  1
    bezier = easeOutBack,  0.34, 1.56, 0.64, 1
    bezier = easeInOut,    0.4,  0,    0.6,  1
    bezier = linear,       0,    0,    1,    1
    bezier = snap,         0.19, 1,    0.22, 1

    # Windows – use slidefade or sliding for reliable horizontal motion
    animation = windowsIn,   1, 4,  easeOutBack,  slidefade
    animation = windowsOut,  1, 3,  easeInOut,    slidefade
    animation = windowsMove, 1, 3,  easeOutExpo

    # Borders (unchanged)
    animation = border,      1, 6,  easeOutExpo
    animation = borderangle, 1, 80, linear, loop

    # Fade (unchanged)
    animation = fade,        1, 4,  easeOutExpo
    animation = fadeIn,      1, 4,  easeOutExpo
    animation = fadeOut,     1, 3,  easeInOut

    # Workspaces – change slidevert → slide (horizontal)
    animation = workspaces,  1, 4,  easeOutExpo, slide
    animation = specialWorkspace, 1, 4, easeOutBack, slide
}
